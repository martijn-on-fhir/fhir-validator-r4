<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1020" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">FHIR Validator MX — Validation Flow</text>

  <!-- ============================================================ -->
  <!-- INITIALIZATION (left column) -->
  <!-- ============================================================ -->
  <rect x="30" y="55" width="250" height="28" rx="4" fill="#e0e7ff" stroke="#818cf8" stroke-width="1"/>
  <text x="155" y="74" text-anchor="middle" font-weight="bold" fill="#3730a3" font-size="12">INITIALIZATION</text>

  <!-- FhirValidator.create() -->
  <rect x="40" y="92" width="230" height="36" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="155" y="115" text-anchor="middle" font-weight="600" fill="#334155">FhirValidator.create()</text>

  <line x1="155" y1="128" x2="155" y2="146" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Load profiles -->
  <rect x="40" y="148" width="230" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="155" y="166" text-anchor="middle" fill="#1e40af" font-weight="600">StructureDefinitionRegistry</text>
  <text x="155" y="182" text-anchor="middle" fill="#1e40af" font-size="11">loadFromDirectory(r4-core, nl-core)</text>

  <line x1="155" y1="192" x2="155" y2="210" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Load terminology -->
  <rect x="40" y="212" width="230" height="44" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="155" y="230" text-anchor="middle" fill="#166534" font-weight="600">TerminologyService</text>
  <text x="155" y="246" text-anchor="middle" fill="#166534" font-size="11">loadFromDirectory(ValueSets, CodeSystems)</text>

  <!-- ============================================================ -->
  <!-- VALIDATION PIPELINE (center/right) -->
  <!-- ============================================================ -->
  <rect x="340" y="55" width="530" height="28" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="605" y="74" text-anchor="middle" font-weight="bold" fill="#92400e" font-size="12">VALIDATION PIPELINE — validator.validate(resource)</text>

  <!-- Step 1: Structure check -->
  <rect x="380" y="96" width="420" height="40" rx="6" fill="#fff7ed" stroke="#f97316"/>
  <text x="590" y="112" text-anchor="middle" font-weight="600" fill="#9a3412">1. Basic Structure Check</text>
  <text x="590" y="127" text-anchor="middle" fill="#9a3412" font-size="11">null? object? has resourceType?</text>

  <!-- fail arrow -->
  <line x1="800" y1="116" x2="850" y2="116" stroke="#dc2626" stroke-dasharray="4" marker-end="url(#arrow-red)"/>
  <text x="860" y="120" fill="#dc2626" font-size="11" font-weight="600">FAIL</text>

  <line x1="590" y1="136" x2="590" y2="158" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Step 2: Resolve profile -->
  <rect x="380" y="160" width="420" height="48" rx="6" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="590" y="178" text-anchor="middle" font-weight="600" fill="#0c4a6e">2. Resolve Profile</text>
  <text x="590" y="196" text-anchor="middle" fill="#0c4a6e" font-size="11">meta.profile[0] or base StructureDefinition/{type}</text>

  <line x1="590" y1="208" x2="590" y2="230" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Step 3: Resolve elements -->
  <rect x="380" y="232" width="420" height="40" rx="6" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="590" y="248" text-anchor="middle" font-weight="600" fill="#0c4a6e">3. Resolve Elements</text>
  <text x="590" y="263" text-anchor="middle" fill="#0c4a6e" font-size="11">snapshot elements + base merge via registry</text>

  <line x1="590" y1="272" x2="590" y2="294" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Step 4: Build slice map -->
  <rect x="380" y="296" width="420" height="40" rx="6" fill="#faf5ff" stroke="#a855f7"/>
  <text x="590" y="312" text-anchor="middle" font-weight="600" fill="#6b21a8">4. Build Slice Map</text>
  <text x="590" y="327" text-anchor="middle" fill="#6b21a8" font-size="11">discriminators: value:url | value:$this | type:$this | pattern</text>

  <line x1="590" y1="336" x2="590" y2="358" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Step 5: Diamond — for each element -->
  <polygon points="590,360 700,390 590,420 480,390" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="590" y="388" text-anchor="middle" font-weight="600" fill="#854d0e" font-size="12">For each element</text>
  <text x="590" y="402" text-anchor="middle" fill="#854d0e" font-size="10">has slice context?</text>

  <!-- YES branch (left) -->
  <line x1="480" y1="390" x2="405" y2="390" stroke="#475569" marker-end="url(#arrow)"/>
  <text x="442" y="383" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">YES</text>

  <!-- Sliced validation box -->
  <rect x="310" y="430" width="190" height="90" rx="6" fill="#faf5ff" stroke="#a855f7"/>
  <text x="405" y="448" text-anchor="middle" font-weight="600" fill="#6b21a8" font-size="12">Slice-Aware Path</text>
  <text x="405" y="466" text-anchor="middle" fill="#6b21a8" font-size="11">resolveParentsAtId()</text>
  <text x="405" y="481" text-anchor="middle" fill="#6b21a8" font-size="11">matchesDiscriminator()</text>
  <text x="405" y="496" text-anchor="middle" fill="#6b21a8" font-size="11">cardinality per matched parent</text>
  <line x1="405" y1="420" x2="405" y2="428" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- NO branch (right) -->
  <line x1="700" y1="390" x2="775" y2="390" stroke="#475569" marker-end="url(#arrow)"/>
  <text x="738" y="383" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">NO</text>

  <!-- Standard validation box -->
  <rect x="680" y="430" width="190" height="90" rx="6" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="775" y="448" text-anchor="middle" font-weight="600" fill="#166534" font-size="12">Standard Path</text>
  <text x="775" y="466" text-anchor="middle" fill="#166534" font-size="11">fhirPath.getValues()</text>
  <text x="775" y="481" text-anchor="middle" fill="#166534" font-size="11">cardinality per parent instance</text>
  <text x="775" y="496" text-anchor="middle" fill="#166534" font-size="11">FHIRPath constraints</text>
  <line x1="775" y1="420" x2="775" y2="428" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Both paths merge down -->
  <line x1="405" y1="520" x2="405" y2="548" stroke="#475569"/>
  <line x1="775" y1="520" x2="775" y2="548" stroke="#475569"/>
  <line x1="405" y1="548" x2="775" y2="548" stroke="#475569"/>
  <line x1="590" y1="548" x2="590" y2="568" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- PER-VALUE CHECKS -->
  <!-- ============================================================ -->
  <rect x="340" y="570" width="500" height="28" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="590" y="589" text-anchor="middle" font-weight="bold" fill="#065f46" font-size="12">PER-VALUE CHECKS (for each non-null value)</text>

  <!-- 4 check boxes in a row -->
  <rect x="345" y="610" width="115" height="50" rx="5" fill="#fff1f2" stroke="#fb7185"/>
  <text x="402" y="631" text-anchor="middle" font-weight="600" fill="#9f1239" font-size="11">Type Check</text>
  <text x="402" y="648" text-anchor="middle" fill="#9f1239" font-size="10">string, Coding, ...</text>

  <rect x="470" y="610" width="115" height="50" rx="5" fill="#dcfce7" stroke="#4ade80"/>
  <text x="527" y="631" text-anchor="middle" font-weight="600" fill="#166534" font-size="11">Terminology</text>
  <text x="527" y="648" text-anchor="middle" fill="#166534" font-size="10">ValueSet / CodeSystem</text>

  <rect x="595" y="610" width="115" height="50" rx="5" fill="#e0e7ff" stroke="#818cf8"/>
  <text x="652" y="631" text-anchor="middle" font-weight="600" fill="#3730a3" font-size="11">Fixed Values</text>
  <text x="652" y="648" text-anchor="middle" fill="#3730a3" font-size="10">fixedUri, fixedCode</text>

  <rect x="720" y="610" width="115" height="50" rx="5" fill="#fef3c7" stroke="#fbbf24"/>
  <text x="777" y="631" text-anchor="middle" font-weight="600" fill="#92400e" font-size="11">Pattern Values</text>
  <text x="777" y="648" text-anchor="middle" fill="#92400e" font-size="10">patternCoding, ...</text>

  <!-- Merge down from checks -->
  <line x1="590" y1="660" x2="590" y2="690" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- TERMINOLOGY DETAIL -->
  <!-- ============================================================ -->
  <rect x="360" y="692" width="460" height="28" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="711" text-anchor="middle" font-weight="bold" fill="#166534" font-size="12">TERMINOLOGY VALIDATION DETAIL</text>

  <!-- Terminology cascade -->
  <rect x="370" y="730" width="130" height="36" rx="5" fill="#f0fdf4" stroke="#86efac"/>
  <text x="435" y="748" text-anchor="middle" fill="#166534" font-size="11">1. ValueSet</text>
  <text x="435" y="760" text-anchor="middle" fill="#166534" font-size="10">expansion/compose</text>

  <line x1="500" y1="748" x2="520" y2="748" stroke="#475569" marker-end="url(#arrow)"/>

  <rect x="522" y="730" width="120" height="36" rx="5" fill="#f0fdf4" stroke="#86efac"/>
  <text x="582" y="748" text-anchor="middle" fill="#166534" font-size="11">2. CodeSystem</text>
  <text x="582" y="760" text-anchor="middle" fill="#166534" font-size="10">concept hierarchy</text>

  <line x1="642" y1="748" x2="662" y2="748" stroke="#475569" marker-end="url(#arrow)"/>

  <rect x="664" y="730" width="120" height="36" rx="5" fill="#f0fdf4" stroke="#86efac"/>
  <text x="724" y="748" text-anchor="middle" fill="#166534" font-size="11">3. Pattern</text>
  <text x="724" y="760" text-anchor="middle" fill="#166534" font-size="10">SNOMED, LOINC, BSN</text>

  <!-- fallback labels -->
  <text x="510" y="741" text-anchor="middle" fill="#6b7280" font-size="9">fallback</text>
  <text x="652" y="741" text-anchor="middle" fill="#6b7280" font-size="9">fallback</text>

  <!-- Down to external -->
  <line x1="590" y1="766" x2="590" y2="784" stroke="#475569" marker-end="url(#arrow)"/>

  <rect x="470" y="786" width="240" height="36" rx="5" fill="#fefce8" stroke="#facc15"/>
  <text x="590" y="804" text-anchor="middle" fill="#854d0e" font-size="11">4. External TX Server (optional)</text>
  <text x="590" y="816" text-anchor="middle" fill="#854d0e" font-size="10">tx.fhir.org/r4 with caching</text>

  <!-- ============================================================ -->
  <!-- RESULT -->
  <!-- ============================================================ -->
  <line x1="590" y1="822" x2="590" y2="850" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Collect issues -->
  <rect x="410" y="852" width="360" height="40" rx="6" fill="#f8fafc" stroke="#64748b"/>
  <text x="590" y="870" text-anchor="middle" font-weight="600" fill="#334155">Collect All Issues</text>
  <text x="590" y="885" text-anchor="middle" fill="#64748b" font-size="11">errors + warnings from all checks</text>

  <line x1="590" y1="892" x2="590" y2="916" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Result diamond -->
  <polygon points="590,918 680,945 590,972 500,945" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="590" y="948" text-anchor="middle" font-weight="600" fill="#334155" font-size="12">errors = 0?</text>

  <!-- Valid -->
  <line x1="500" y1="945" x2="420" y2="945" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="330" y="930" width="90" height="30" rx="15" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="375" y="950" text-anchor="middle" font-weight="bold" fill="#16a34a">VALID</text>

  <!-- Invalid -->
  <line x1="680" y1="945" x2="760" y2="945" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="762" y="930" width="100" height="30" rx="15" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="812" y="950" text-anchor="middle" font-weight="bold" fill="#dc2626">INVALID</text>

  <!-- Return type -->
  <text x="590" y="1000" text-anchor="middle" fill="#64748b" font-size="11">Returns: ValidationResult { valid, issues[], resourceType, profile }</text>
</svg>
