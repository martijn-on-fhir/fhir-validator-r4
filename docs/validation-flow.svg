<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1340" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">FHIR Validator MX — Validation Flow</text>

  <!-- ============================================================ -->
  <!-- INITIALIZATION (left column) -->
  <!-- ============================================================ -->
  <rect x="30" y="55" width="250" height="28" rx="4" fill="#e0e7ff" stroke="#818cf8" stroke-width="1"/>
  <text x="155" y="74" text-anchor="middle" font-weight="bold" fill="#3730a3" font-size="12">INITIALIZATION</text>

  <!-- FhirValidator.create() -->
  <rect x="40" y="92" width="230" height="36" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="155" y="115" text-anchor="middle" font-weight="600" fill="#334155">FhirValidator.create()</text>

  <line x1="155" y1="128" x2="155" y2="146" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Load profiles -->
  <rect x="40" y="148" width="230" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="155" y="166" text-anchor="middle" fill="#1e40af" font-weight="600">StructureDefinitionRegistry</text>
  <text x="155" y="182" text-anchor="middle" fill="#1e40af" font-size="11">loadFromDirectory(r4-core, nl-core)</text>

  <line x1="155" y1="192" x2="155" y2="210" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Load terminology -->
  <rect x="40" y="212" width="230" height="44" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="155" y="230" text-anchor="middle" fill="#166534" font-weight="600">TerminologyService</text>
  <text x="155" y="246" text-anchor="middle" fill="#166534" font-size="11">loadFromDirectory(ValueSets, CodeSystems)</text>

  <line x1="155" y1="256" x2="155" y2="274" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Nictiz + Art-decor clients -->
  <rect x="40" y="276" width="230" height="56" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="155" y="294" text-anchor="middle" fill="#92400e" font-weight="600">External Clients</text>
  <text x="155" y="310" text-anchor="middle" fill="#92400e" font-size="11">NictizTerminologyClient (OAuth2)</text>
  <text x="155" y="324" text-anchor="middle" fill="#92400e" font-size="11">ArtDecorClient (auto-resolution)</text>

  <!-- ============================================================ -->
  <!-- VALIDATION PIPELINE (center/right) -->
  <!-- ============================================================ -->
  <rect x="340" y="55" width="550" height="28" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="615" y="74" text-anchor="middle" font-weight="bold" fill="#92400e" font-size="12">VALIDATION PIPELINE — validator.validate(resource)</text>

  <!-- Step 0: Prototype pollution -->
  <rect x="380" y="96" width="450" height="40" rx="6" fill="#fef2f2" stroke="#ef4444"/>
  <text x="605" y="112" text-anchor="middle" font-weight="600" fill="#991b1b">0. Prototype Pollution Check</text>
  <text x="605" y="127" text-anchor="middle" fill="#991b1b" font-size="11">scan for __proto__, constructor, prototype keys (depth 20)</text>

  <line x1="830" y1="116" x2="870" y2="116" stroke="#dc2626" stroke-dasharray="4" marker-end="url(#arrow-red)"/>
  <text x="880" y="120" fill="#dc2626" font-size="11" font-weight="600">FAIL</text>

  <line x1="605" y1="136" x2="605" y2="154" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Step 1: Structure check -->
  <rect x="380" y="156" width="450" height="40" rx="6" fill="#fff7ed" stroke="#f97316"/>
  <text x="605" y="172" text-anchor="middle" font-weight="600" fill="#9a3412">1. Basic Structure Check</text>
  <text x="605" y="187" text-anchor="middle" fill="#9a3412" font-size="11">null? object? has resourceType (string)?</text>

  <line x1="830" y1="176" x2="870" y2="176" stroke="#dc2626" stroke-dasharray="4" marker-end="url(#arrow-red)"/>
  <text x="880" y="180" fill="#dc2626" font-size="11" font-weight="600">FAIL</text>

  <line x1="605" y1="196" x2="605" y2="214" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Step 1b: FHIR version check -->
  <rect x="380" y="216" width="450" height="40" rx="6" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="605" y="232" text-anchor="middle" font-weight="600" fill="#0c4a6e">1b. FHIR Version Check (optional)</text>
  <text x="605" y="247" text-anchor="middle" fill="#0c4a6e" font-size="11">meta.profile version vs configured fhirVersion</text>

  <line x1="605" y1="256" x2="605" y2="274" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Step 2: Resolve profile -->
  <rect x="380" y="276" width="450" height="40" rx="6" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="605" y="292" text-anchor="middle" font-weight="600" fill="#0c4a6e">2. Resolve Profile</text>
  <text x="605" y="307" text-anchor="middle" fill="#0c4a6e" font-size="11">meta.profile[0] or base StructureDefinition/{type}</text>

  <line x1="605" y1="316" x2="605" y2="334" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Step 3: Resolve elements + build slice map -->
  <rect x="380" y="336" width="450" height="40" rx="6" fill="#faf5ff" stroke="#a855f7"/>
  <text x="605" y="352" text-anchor="middle" font-weight="600" fill="#6b21a8">3. Resolve Elements + Build Slice Map</text>
  <text x="605" y="367" text-anchor="middle" fill="#6b21a8" font-size="11">snapshot elements, discriminators: value | type | pattern</text>

  <line x1="605" y1="376" x2="605" y2="398" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Step 4: Diamond — for each element -->
  <polygon points="605,400 715,430 605,460 495,430" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="605" y="428" text-anchor="middle" font-weight="600" fill="#854d0e" font-size="12">For each element</text>
  <text x="605" y="442" text-anchor="middle" fill="#854d0e" font-size="10">has slice context?</text>

  <!-- YES branch (left) -->
  <line x1="495" y1="430" x2="420" y2="430" stroke="#475569" marker-end="url(#arrow)"/>
  <text x="457" y="423" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">YES</text>

  <!-- Sliced validation box -->
  <rect x="320" y="470" width="190" height="80" rx="6" fill="#faf5ff" stroke="#a855f7"/>
  <text x="415" y="488" text-anchor="middle" font-weight="600" fill="#6b21a8" font-size="12">Slice-Aware Path</text>
  <text x="415" y="506" text-anchor="middle" fill="#6b21a8" font-size="11">matchesDiscriminator()</text>
  <text x="415" y="521" text-anchor="middle" fill="#6b21a8" font-size="11">cardinality per matched slice</text>
  <text x="415" y="536" text-anchor="middle" fill="#6b21a8" font-size="11">FHIRPath constraints</text>
  <line x1="415" y1="460" x2="415" y2="468" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- NO branch (right) -->
  <line x1="715" y1="430" x2="790" y2="430" stroke="#475569" marker-end="url(#arrow)"/>
  <text x="753" y="423" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">NO</text>

  <!-- Standard validation box -->
  <rect x="700" y="470" width="190" height="80" rx="6" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="795" y="488" text-anchor="middle" font-weight="600" fill="#166534" font-size="12">Standard Path</text>
  <text x="795" y="506" text-anchor="middle" fill="#166534" font-size="11">fhirPath.getValues()</text>
  <text x="795" y="521" text-anchor="middle" fill="#166534" font-size="11">cardinality per parent</text>
  <text x="795" y="536" text-anchor="middle" fill="#166534" font-size="11">FHIRPath constraints</text>
  <line x1="795" y1="460" x2="795" y2="468" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Both paths merge down -->
  <line x1="415" y1="550" x2="415" y2="575" stroke="#475569"/>
  <line x1="795" y1="550" x2="795" y2="575" stroke="#475569"/>
  <line x1="415" y1="575" x2="795" y2="575" stroke="#475569"/>
  <line x1="605" y1="575" x2="605" y2="595" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- PER-VALUE CHECKS -->
  <!-- ============================================================ -->
  <rect x="350" y="597" width="510" height="28" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="605" y="616" text-anchor="middle" font-weight="bold" fill="#065f46" font-size="12">PER-VALUE CHECKS (for each non-null value)</text>

  <!-- 4 check boxes in a row -->
  <rect x="355" y="637" width="118" height="50" rx="5" fill="#fff1f2" stroke="#fb7185"/>
  <text x="414" y="658" text-anchor="middle" font-weight="600" fill="#9f1239" font-size="11">Type Check</text>
  <text x="414" y="675" text-anchor="middle" fill="#9f1239" font-size="10">date/dateTime/instant</text>

  <rect x="483" y="637" width="118" height="50" rx="5" fill="#dcfce7" stroke="#4ade80"/>
  <text x="542" y="658" text-anchor="middle" font-weight="600" fill="#166534" font-size="11">Terminology</text>
  <text x="542" y="675" text-anchor="middle" fill="#166534" font-size="10">ValueSet / CodeSystem</text>

  <rect x="611" y="637" width="118" height="50" rx="5" fill="#e0e7ff" stroke="#818cf8"/>
  <text x="670" y="658" text-anchor="middle" font-weight="600" fill="#3730a3" font-size="11">Fixed Values</text>
  <text x="670" y="675" text-anchor="middle" fill="#3730a3" font-size="10">fixedUri, fixedCode</text>

  <rect x="739" y="637" width="118" height="50" rx="5" fill="#fef3c7" stroke="#fbbf24"/>
  <text x="798" y="658" text-anchor="middle" font-weight="600" fill="#92400e" font-size="11">Pattern Values</text>
  <text x="798" y="675" text-anchor="middle" fill="#92400e" font-size="10">patternCoding, ...</text>

  <!-- Merge down from checks -->
  <line x1="605" y1="687" x2="605" y2="715" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- TERMINOLOGY DETAIL -->
  <!-- ============================================================ -->
  <rect x="350" y="717" width="510" height="28" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="605" y="736" text-anchor="middle" font-weight="bold" fill="#166534" font-size="12">TERMINOLOGY VALIDATION CASCADE</text>

  <!-- Pre-step: System aliases -->
  <rect x="360" y="755" width="490" height="28" rx="5" fill="#f0f9ff" stroke="#7dd3fc"/>
  <text x="605" y="774" text-anchor="middle" fill="#0c4a6e" font-size="11">System Alias Resolution: urn:oid:1.0.639.1 -> iso639-1, urn:oid:2.16.840.1.113883.6.121 -> iso639-2</text>

  <line x1="605" y1="783" x2="605" y2="799" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Row 1: Local + Art-decor + Nictiz -->
  <rect x="360" y="801" width="120" height="44" rx="5" fill="#f0fdf4" stroke="#86efac"/>
  <text x="420" y="819" text-anchor="middle" fill="#166534" font-size="11">1. Local ValueSet</text>
  <text x="420" y="835" text-anchor="middle" fill="#166534" font-size="10">expansion / compose</text>

  <line x1="480" y1="823" x2="498" y2="823" stroke="#475569" marker-end="url(#arrow)"/>
  <text x="489" y="816" text-anchor="middle" fill="#6b7280" font-size="9">miss?</text>

  <rect x="500" y="801" width="120" height="44" rx="5" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="560" y="819" text-anchor="middle" fill="#1e40af" font-size="11">2. Art-decor</text>
  <text x="560" y="835" text-anchor="middle" fill="#1e40af" font-size="10">auto-fetch + register</text>

  <line x1="620" y1="823" x2="638" y2="823" stroke="#475569" marker-end="url(#arrow)"/>
  <text x="629" y="816" text-anchor="middle" fill="#6b7280" font-size="9">fail?</text>

  <rect x="640" y="801" width="120" height="44" rx="5" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="700" y="819" text-anchor="middle" fill="#92400e" font-size="11">3. Nictiz $lookup</text>
  <text x="700" y="835" text-anchor="middle" fill="#92400e" font-size="10">SNOMED CT NL</text>

  <!-- Row 1b: Binding strength + Trusted -->
  <line x1="605" y1="845" x2="605" y2="861" stroke="#475569" marker-end="url(#arrow)"/>

  <rect x="360" y="863" width="190" height="36" rx="5" fill="#faf5ff" stroke="#c084fc"/>
  <text x="455" y="881" text-anchor="middle" fill="#6b21a8" font-size="11">Extensible Binding Check</text>
  <text x="455" y="893" text-anchor="middle" fill="#6b21a8" font-size="10">other systems OK if not required</text>

  <rect x="570" y="863" width="190" height="36" rx="5" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="665" y="881" text-anchor="middle" fill="#475569" font-size="11">Trusted System Fallback</text>
  <text x="665" y="893" text-anchor="middle" fill="#475569" font-size="10">ISO 639, BCP 47, etc.</text>

  <!-- Row 2: CodeSystem path -->
  <line x1="605" y1="899" x2="605" y2="915" stroke="#475569" marker-end="url(#arrow)"/>

  <rect x="360" y="917" width="120" height="36" rx="5" fill="#f0fdf4" stroke="#86efac"/>
  <text x="420" y="935" text-anchor="middle" fill="#166534" font-size="11">4. Local CodeSys</text>
  <text x="420" y="947" text-anchor="middle" fill="#166534" font-size="10">concept hierarchy</text>

  <rect x="500" y="917" width="120" height="36" rx="5" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="560" y="935" text-anchor="middle" fill="#1e40af" font-size="11">5. Art-decor CS</text>
  <text x="560" y="947" text-anchor="middle" fill="#1e40af" font-size="10">urn:oid: systems</text>

  <rect x="640" y="917" width="120" height="36" rx="5" fill="#f0fdf4" stroke="#86efac"/>
  <text x="700" y="935" text-anchor="middle" fill="#166534" font-size="11">6. Pattern Check</text>
  <text x="700" y="947" text-anchor="middle" fill="#166534" font-size="10">SNOMED, BSN, ...</text>

  <!-- Row 3: Trusted + Nictiz fallback -->
  <line x1="605" y1="953" x2="605" y2="969" stroke="#475569" marker-end="url(#arrow)"/>

  <rect x="420" y="971" width="150" height="36" rx="5" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="495" y="989" text-anchor="middle" fill="#475569" font-size="11">7. Trusted Systems</text>
  <text x="495" y="1001" text-anchor="middle" fill="#475569" font-size="10">admin-gender, etc.</text>

  <rect x="590" y="971" width="150" height="36" rx="5" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="665" y="989" text-anchor="middle" fill="#92400e" font-size="11">8. Nictiz / External</text>
  <text x="665" y="1001" text-anchor="middle" fill="#92400e" font-size="10">unknown systems</text>

  <!-- ============================================================ -->
  <!-- POST-PROCESSING -->
  <!-- ============================================================ -->
  <line x1="605" y1="1007" x2="605" y2="1030" stroke="#475569" marker-end="url(#arrow)"/>

  <rect x="350" y="1032" width="510" height="28" rx="4" fill="#e0e7ff" stroke="#818cf8" stroke-width="1"/>
  <text x="605" y="1051" text-anchor="middle" font-weight="bold" fill="#3730a3" font-size="12">POST-PROCESSING</text>

  <!-- Severity overrides + collect -->
  <rect x="380" y="1070" width="210" height="44" rx="6" fill="#e0e7ff" stroke="#818cf8"/>
  <text x="485" y="1088" text-anchor="middle" font-weight="600" fill="#3730a3" font-size="11">Severity Overrides</text>
  <text x="485" y="1103" text-anchor="middle" fill="#3730a3" font-size="10">CODE_INVALID -> warning, etc.</text>

  <rect x="610" y="1070" width="210" height="44" rx="6" fill="#f8fafc" stroke="#64748b"/>
  <text x="715" y="1088" text-anchor="middle" font-weight="600" fill="#334155" font-size="11">Attach Metadata</text>
  <text x="715" y="1103" text-anchor="middle" fill="#64748b" font-size="10">validationId (UUID) + timestamp</text>

  <line x1="605" y1="1114" x2="605" y2="1140" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Collect issues -->
  <rect x="420" y="1142" width="370" height="40" rx="6" fill="#f8fafc" stroke="#64748b"/>
  <text x="605" y="1160" text-anchor="middle" font-weight="600" fill="#334155">Collect All Issues</text>
  <text x="605" y="1175" text-anchor="middle" fill="#64748b" font-size="11">recompute validity after severity overrides</text>

  <line x1="605" y1="1182" x2="605" y2="1210" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- RESULT -->
  <!-- ============================================================ -->

  <!-- Result diamond -->
  <polygon points="605,1212 695,1239 605,1266 515,1239" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="605" y="1242" text-anchor="middle" font-weight="600" fill="#334155" font-size="12">errors = 0?</text>

  <!-- Valid -->
  <line x1="515" y1="1239" x2="435" y2="1239" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="345" y="1224" width="90" height="30" rx="15" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="390" y="1244" text-anchor="middle" font-weight="bold" fill="#16a34a">VALID</text>

  <!-- Invalid -->
  <line x1="695" y1="1239" x2="775" y2="1239" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="777" y="1224" width="100" height="30" rx="15" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="827" y="1244" text-anchor="middle" font-weight="bold" fill="#dc2626">INVALID</text>

  <!-- Return type -->
  <text x="605" y="1300" text-anchor="middle" fill="#64748b" font-size="11">Returns: ValidationResult { valid, issues[], validationId, timestamp, resourceType, profile }</text>

  <!-- Security note -->
  <rect x="345" y="1310" width="520" height="24" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-dasharray="4"/>
  <text x="605" y="1327" text-anchor="middle" fill="#991b1b" font-size="10">Security: sanitized error messages (no PHI) | rate limiting (30/min) | prototype pollution detection</text>
</svg>
